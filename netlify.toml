# netlify.toml
# Conecta este repo a Netlify y el deploy es automático en cada git push.
# Sin FTP. Sin SSH. Sin servidor que mantener.

[build]
  publish = "."   # raíz del proyecto es el output

[[headers]]
  for = "/*"
  [headers.values]
    # Seguridad básica
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

    # Performance: cachear assets estáticos agresivamente
    # El JSON de proyectos tiene cache corto para que los cambios se vean rápido
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=60, stale-while-revalidate=300"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
